# Docker Compose - StudyTrackPro
# Produção (sem portas DB/Redis, sem Vite): docker-compose.production.yml + alvo `make prod-up` no Makefile.
# Services: nginx (proxy), php-fpm (Laravel), reverb (WebSocket), horizon (queue worker),
# scheduler (cron), node (Vite dev), postgres, redis
# 
# Network: app (internal) - all services communicate internally
# Public: Only nginx exposes ports to host
#
# PgAdmin (só desenvolvimento): imagem pinada em docker-compose.dev.yml → dpage/pgadmin4:9.14.0 (nunca :latest).

services:
  # ========================
  # NGINX - Reverse Proxy
  # ========================
  nginx:
    container_name: nginx
    build: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./frontend/dist:/var/www/html/public/frontend:ro
      - ./docker/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./docker/nginx/conf.d/studytrack.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c812c3a3c4685cda4fc087d6d4edf667}
      REDIS_DATABASE: ${CACHE_DATABASE:-1}
      REDIS_PREFIX: ${REDIS_PREFIX:-studytrackpro_database_}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE:-studytrack_session}
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  # ========================
  # PHP-FPM - Laravel API
  # ========================
  php-fpm:
    container_name: php-fpm
    build: ./docker/php
    volumes:
      - ./backend:/var/www/html
      - ./redis-scripts:/var/www/redis-scripts:ro
      # For persistent storage in production:
      # - app_storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c812c3a3c4685cda4fc087d6d4edf667}
      # Load from .env in production:
      # - REDIS_PASSWORD (from .env.production)
      # - DB_PASSWORD (from .env.production)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M

  # ========================
  # REVERB - WebSocket Server
  # ========================
  reverb:
    container_name: reverb
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/html
      - ./redis-scripts:/var/www/redis-scripts:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c812c3a3c4685cda4fc087d6d4edf667}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r \"@fsockopen('127.0.0.1', 8080) or exit(1);\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ========================
  # HORIZON - Queue Worker
  # ========================
  horizon:
    container_name: horizon
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
      - ./redis-scripts:/var/www/redis-scripts:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c812c3a3c4685cda4fc087d6d4edf667}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status 2>&1 | grep -q running || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  # ========================
  # SCHEDULER - Task Scheduler
  # ========================
  scheduler:
    container_name: scheduler
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
      - ./redis-scripts:/var/www/redis-scripts:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c812c3a3c4685cda4fc087d6d4edf667}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo 'ok';\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ========================
  # NODE - Frontend Dev Server (Vite)
  # ========================
  node:
    container_name: node
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_DEV_POLLING=true
      - VITE_API_URL=
      - VITE_REVERB_HOST=localhost
      - VITE_REVERB_PORT=80
      - VITE_REVERB_SCHEME=http
      - PROXY_TARGET=http://nginx:80
    command: sh -c "if [ ! -f /app/node_modules/.package-lock.json ] || ! cmp -s /app/package-lock.json /app/node_modules/.package-lock.json; then npm ci && cp /app/package-lock.json /app/node_modules/.package-lock.json; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ========================
  # POSTGRESQL - Database
  # ========================
  postgres:
    container_name: postgres
    build: ./docker/postgres
    environment:
      POSTGRES_DB: studytrack
      POSTGRES_USER: studytrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Host: PHPUnit e artisan no Windows/macOS/Linux usam 127.0.0.1 (phpunit.xml)
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_pllua_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studytrack -d studytrack"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # ========================
  # REDIS - Cache & Sessions
  # ========================
  redis:
    container_name: redis
    # Tag oficial `alpine` = último Redis estável em Alpine (equiv. a “pull latest alpine”; evita redis:7-alpine com Go/openssl antigos).
    image: redis:alpine
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint.sh"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c812c3a3c4685cda4fc087d6d4edf667}
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./docker/redis/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - redis_data:/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

# ========================
# NETWORKS
# ========================
networks:
  app:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ========================
# VOLUMES
# ========================
volumes:
  postgres_pllua_data:
    driver: local
  redis_data:
    driver: local
  node_modules:
    driver: local
  # app_storage:  # Uncomment for persistent app storage
  #   driver: local
