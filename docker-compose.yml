services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/html/public/frontend
    depends_on:
      - php-fpm

  php-fpm:
    build: ./docker/php
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - redis

  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis

  node:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=
      - VITE_REVERB_HOST=${VITE_REVERB_HOST:-localhost}
      - VITE_REVERB_PORT=${VITE_REVERB_PORT:-5173}
      - VITE_REVERB_SCHEME=http
      - PROXY_TARGET=http://nginx
    command: sh -c "find /app/node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null; npm install && npm run dev -- --host 0.0.0.0"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studytrack
      POSTGRES_USER: studytrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studytrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  node_modules:
