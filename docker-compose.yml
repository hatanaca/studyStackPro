# Docker Compose - StudyTrackPro
# Serviços: nginx (proxy), php-fpm (Laravel), reverb (WebSocket), horizon (filas),
# scheduler (cron), node (Vite dev), postgres, redis

services:
  # Proxy reverso: API, SPA, WebSocket, health, Horizon
  nginx:
    container_name: nginx
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/html/public/frontend
    depends_on:
      - php-fpm

  # Laravel (API + frontend estático em produção)
  php-fpm:
    container_name: php-fpm
    build: ./docker/php
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  # Laravel Reverb - WebSocket para dashboard em tempo real
  reverb:
    container_name: reverb
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - redis
    restart: unless-stopped

  # Laravel Horizon - processamento de filas (jobs, recálculo de métricas)
  horizon:
    container_name: horizon
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Scheduler - substitui cron para tarefas agendadas (schedule:work)
  scheduler:
    container_name: scheduler
    build:
      context: ./docker/php
      dockerfile: Dockerfile.cli
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis

  # Node - ambiente de desenvolvimento do frontend (Vite)
  node:
    container_name: node
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=
      - VITE_REVERB_HOST=${VITE_REVERB_HOST:-localhost}
      - VITE_REVERB_PORT=${VITE_REVERB_PORT:-5173}
      - VITE_REVERB_SCHEME=http
      - PROXY_TARGET=http://nginx
    command: sh -c "find /app/node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null; npm install && npm run dev -- --host 0.0.0.0"

  # PostgreSQL 16 - banco principal + schema analytics
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studytrack
      POSTGRES_USER: studytrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studytrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 7 - cache, filas, sessões, Reverb
  redis:
    container_name: redis
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# Volumes persistentes para dados entre restarts
volumes:
  postgres_data:
  redis_data:
  node_modules:
