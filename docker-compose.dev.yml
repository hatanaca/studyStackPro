# Override para desenvolvimento: serviços adicionais (pgAdmin, Mailpit)
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@studytrack.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1
    ports:
      - "8025:8025"
    networks:
      - app
    restart: unless-stopped
