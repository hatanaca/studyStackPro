name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile.production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/studytrack-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/studytrack-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/node/Dockerfile.frontend
          build-args: |
            NODE_ENV=production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/studytrack-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/studytrack-frontend:${{ github.sha }}

