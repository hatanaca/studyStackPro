# Redis configuration with authentication

# Accept connections on all interfaces (Docker network only)
bind 0.0.0.0
protected-mode yes

# Port
port 6379

# Require password for all connections
requirepass c812c3a3c4685cda4fc087d6d4edf667

# TCP keepalive
tcp-keepalive 300

# Timeout for idle clients (0 = disabled)
timeout 0

# Maximum number of connected clients
maxclients 10000

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (optional - adjust for your needs)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# AOF persistence (optional)
appendonly no

# Security: disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command KEYS ""
