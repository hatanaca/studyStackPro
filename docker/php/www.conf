[www]
user = www-data
group = www-data
; Pool de processos para PHP-FPM
; pm.max_children deve ser ~(memória_total / memória_por_processo)
; Ex: 512MB / 64MB ≈ 8 workers; ajuste conforme recursos do servidor
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
