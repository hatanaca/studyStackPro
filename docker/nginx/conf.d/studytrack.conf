upstream php_backend {
    server php-fpm:9000;
}

upstream reverb_websocket {
    server reverb:8080;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_comp_level 6;

    rewrite_by_lua_block {
        local blocked_status

        local ok, err = pcall(function()
            local user_agent = string.lower(ngx.var.http_user_agent or "")
            local blocked_agents = {
                "sqlmap",
                "nikto",
                "masscan",
                "zgrab",
                "nmap",
                "dirbuster",
                "nuclei",
            }

            for _, blocked in ipairs(blocked_agents) do
                if user_agent:find(blocked, 1, true) then
                    ngx.log(ngx.WARN, "WAF bloqueou user-agent suspeito: ", blocked)
                    blocked_status = 403
                    return
                end
            end

            local request_uri = string.lower(ngx.var.request_uri or "")
            local blocked_uri_patterns = {
                "union select",
                "1=1",
                "' or '1'='1",
            }

            for _, pattern in ipairs(blocked_uri_patterns) do
                if request_uri:find(pattern, 1, true) then
                    blocked_status = 400
                    return
                end
            end
        end)

        if not ok then
            ngx.log(ngx.ERR, "Falha no WAF Lua; seguindo em fail-open: ", err)
            return
        end

        if blocked_status then
            return ngx.exit(blocked_status)
        end
    }

    header_filter_by_lua_block {
        local ok, err = pcall(function()
            local request_id = ngx.var.request_id
                or (tostring(ngx.var.msec or "0") .. "-" .. tostring(ngx.worker.pid()) .. "-" .. tostring(ngx.var.connection or "0"))

            ngx.header["X-Content-Type-Options"] = "nosniff"
            ngx.header["X-Frame-Options"] = "DENY"
            ngx.header["Referrer-Policy"] = "strict-origin-when-cross-origin"
            ngx.header["X-Request-ID"] = request_id
            ngx.header["Permissions-Policy"] = "geolocation=(), microphone=()"
            ngx.header["X-Powered-By"] = nil
            ngx.header["Server"] = nil
        end)

        if not ok then
            ngx.log(ngx.ERR, "Falha ao aplicar headers Lua; seguindo em fail-open: ", err)
        end
    }

    add_header X-XSS-Protection "1; mode=block" always;
    # connect-src: API/Reverb em subdomínio ou proxy /app/ (wss) — evita bloquear produção HTTPS.
    # Sem 'unsafe-eval': build Vite produção não precisa; reduz superfície XSS. Mantém 'unsafe-inline' (PrimeVue/temas).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss: ws: http://127.0.0.1:* http://localhost:*; frame-ancestors 'none';" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /health {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    location = /nginx-health {
        default_type text/plain;
        return 200 "ok\n";
    }

    # Sanctum CSRF cookie (SPA) — não pode ser servido pelo bloco SPA (/)
    location ^~ /sanctum/ {
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        client_max_body_size 2M;
    }

    location = /__edge_token_revoked__ {
        internal;
        default_type application/json;
        return 401 '{"error":"Token revoked"}';
    }

    # Inclui /api/v1/* e /api/broadcasting/* (Laravel Echo); /api/broadcasting/auth não pode cair no location / (SPA).
    location ^~ /api/ {
        access_by_lua_block {
            local blocked_status
            local blocked_body

            local ok, err = pcall(function()
                local request_uri = ngx.var.uri or ""
                local public_paths = {
                    ["/api/v1/auth/login"] = true,
                    ["/api/v1/auth/register"] = true,
                    ["/api/health"] = true,
                }

                if public_paths[request_uri] then
                    return
                end

                -- Sessão web Sanctum (cookie HttpOnly): deixa o Laravel validar; evita exigir Bearer na SPA.
                local session_cookie_name = os.getenv("SESSION_COOKIE_NAME") or "studytrack_session"
                local cookie_header = ngx.var.http_cookie or ""
                if string.find(cookie_header, session_cookie_name .. "=", 1, true) then
                    return
                end

                local ok_redis, redis = pcall(require, "resty.redis")
                local ok_string, str = pcall(require, "resty.string")
                local ok_sha256, sha256 = pcall(require, "resty.sha256")

                if not ok_redis or not ok_string or not ok_sha256 then
                    ngx.log(ngx.ERR, "Dependências Lua do OpenResty indisponíveis; seguindo em fail-open.")
                    return
                end

                local authorization = ngx.var.http_authorization
                if not authorization then
                    blocked_status = 401
                    blocked_body = '{"error":"Unauthenticated"}'
                    return
                end

                local _, _, token = string.find(authorization, "[Bb]earer%s+(.+)")
                if not token or token == "" then
                    blocked_status = 401
                    blocked_body = '{"error":"Unauthenticated"}'
                    return
                end

                local _, _, token_secret = string.find(token, "^[^|]+|(.+)$")
                local token_to_hash = token_secret or token
                local sha = sha256:new()
                sha:update(token_to_hash)
                local token_hash = str.to_hex(sha:final())

                local cache = ngx.shared.token_cache
                local cached = cache:get(token_hash)
                if cached == "ok" then
                    return
                elseif cached == "revoked" then
                    blocked_status = "revoked"
                    return
                end

                local red = redis:new()
                red:set_timeout(100)

                local host = os.getenv("REDIS_HOST") or "redis"
                local port = tonumber(os.getenv("REDIS_PORT") or "6379")
                local password = os.getenv("REDIS_PASSWORD")
                local database = tonumber(os.getenv("REDIS_DATABASE") or "1")
                local prefix = os.getenv("REDIS_PREFIX") or "studytrackpro_database_"

                local connected, connect_err = red:connect(host, port)
                if not connected then
                    ngx.log(ngx.WARN, "Redis indisponível no edge Lua; seguindo em fail-open: ", connect_err)
                    return
                end

                if password and password ~= "" then
                    local authed, auth_err = red:auth(password)
                    if not authed then
                        ngx.log(ngx.WARN, "Falha ao autenticar no Redis do edge Lua; seguindo em fail-open: ", auth_err)
                        red:set_keepalive(10000, 100)
                        return
                    end
                end

                local selected, select_err = red:select(database)
                if not selected then
                    ngx.log(ngx.WARN, "Falha ao selecionar database Redis no edge Lua; seguindo em fail-open: ", select_err)
                    red:set_keepalive(10000, 100)
                    return
                end

                local blacklist_key = prefix .. "token_blacklist:" .. token_hash
                local blacklisted, get_err = red:get(blacklist_key)

                red:set_keepalive(10000, 100)

                if get_err then
                    ngx.log(ngx.WARN, "Falha ao consultar blacklist no Redis; seguindo em fail-open: ", get_err)
                    return
                end

                if blacklisted and blacklisted ~= ngx.null then
                    cache:set(token_hash, "revoked", 30)
                    blocked_status = "revoked"
                else
                    cache:set(token_hash, "ok", 15)
                end
            end)

            if not ok then
                ngx.log(ngx.ERR, "Falha na validação Lua do edge; seguindo em fail-open: ", err)
                return
            end

            if blocked_status == "revoked" then
                return ngx.exec("/__edge_token_revoked__")
            end

            if blocked_status then
                ngx.status = blocked_status
                ngx.header["Content-Type"] = "application/json"
                ngx.say(blocked_body)
                return ngx.exit(blocked_status)
            end
        }

        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        client_max_body_size 20M;

        fastcgi_read_timeout 120;
        fastcgi_send_timeout 60;
        fastcgi_connect_timeout 10;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location /app/ {
        proxy_pass http://reverb_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_cache_bypass $http_upgrade;
    }

    location /horizon {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        root /var/www/html/public/frontend;
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "public, max-age=3600";
        }
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        location ~ /uploads/.*\.php$ {
            deny all;
        }
    }

    location ~ /\. {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /config {
        deny all;
    }

    location ~ /storage {
        deny all;
    }
}
