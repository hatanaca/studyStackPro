# Nginx - proxy reverso para StudyTrackPro
# Roteamento: /api => Laravel; /app => Reverb (WS); / => SPA Vue; /health => health check

# Redirect HTTP to HTTPS in production
# Uncomment for production with SSL certificate
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

upstream php_backend {
    server php-fpm:9000;
}

upstream reverb_websocket {
    server reverb:8080;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_comp_level 6;

    index index.php;
    charset utf-8;

    # ========================
    # SECURITY HEADERS
    # ========================
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "DENY" always;
    
    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Restrict permissions
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    
    # HSTS - Enable in production with HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' localhost:8080 wss://localhost:8080 ws://localhost:8080; frame-ancestors 'none';" always;

    # ========================
    # STATIC ASSETS
    # ========================
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ========================
    # HEALTH CHECK
    # ========================
    
    location = /health {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    # ========================
    # API ROUTES
    # ========================
    
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Prevent request body size attacks
        client_max_body_size 10M;
    }

    # ========================
    # WEBSOCKET (REVERB)
    # ========================
    
    location /app/ {
        proxy_pass http://reverb_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_cache_bypass $http_upgrade;
    }

    # ========================
    # HORIZON DASHBOARD
    # ========================
    
    location /horizon {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # ========================
    # SPA FRONTEND (Vue)
    # ========================
    
    location / {
        root /var/www/html/public/frontend;
        try_files $uri $uri/ /index.html;
        
        # Cache index.html but not aggressive
        location = /index.html {
            add_header Cache-Control "public, max-age=3600";
        }
    }

    # ========================
    # PHP FALLBACK
    # ========================
    
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Prevent PHP direct execution in upload directories
        location ~ /uploads/.*\.php$ {
            deny all;
        }
    }

    # ========================
    # DENY DANGEROUS LOCATIONS
    # ========================
    
    # Deny access to config/private files
    location ~ /\. {
        deny all;
    }
    
    location ~ /\.env {
        deny all;
    }
    
    location ~ /config {
        deny all;
    }
    
    location ~ /storage {
        deny all;
    }
}

