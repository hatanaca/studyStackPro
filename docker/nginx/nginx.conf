# Nginx - proxy reverso para StudyTrackPro
# Roteamento: /api → Laravel; /app → Reverb (WS); / → SPA Vue; /health → health check
server {
    # Compressão gzip para respostas
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_comp_level 6;
    listen 80;
    server_name localhost;
    root /var/www/html/public;  # Raiz do Laravel

    index index.php;
    charset utf-8;

    # Headers de segurança (XSS, clickjacking, etc.)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Com HTTPS em produção, descomente e ajuste max-age: add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content-Security-Policy: ajustar conforme necessidade da SPA/API (ex: default-src 'self')

    # Assets estáticos com cache longo (imutáveis em build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check (raiz)
    location = /health {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }

    # API Laravel - todas as rotas /api/* passam pelo index.php
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # WebSocket (Laravel Reverb)
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Horizon Dashboard - UI de monitoramento de filas
    location /horizon {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # SPA Vue - fallback para index.html (History Mode)
    location / {
        root /var/www/html/public/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Scripts PHP diretos (fallback)
    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
